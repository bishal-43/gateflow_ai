[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Note for teammates:
# Basic auth tests (test_auth.py) run with in-memory SQLite — no setup needed.
# Tests that involve UUIDs across tables (invites, entry, walkin, documents)
# require a real PostgreSQL database.
# To run those tests, set TEST_DATABASE_URL in your .env to a test PostgreSQL DB.
